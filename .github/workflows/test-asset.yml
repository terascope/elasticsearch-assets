name: Test Teraslice Asset
run-name: ${{ github.actor }} is testing the Teraslice Asset
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - 'release/elasticsearch-assets-v*'
  pull_request:
    branches:
      - master
      - 'release/elasticsearch-assets-v*'

permissions: {}

jobs:
  compute-vars:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      COMMIT_SHORT_SHA: ${{ steps.get-short-sha.outputs.COMMIT_SHORT_SHA }}
      TERASLICE_CLI_VERSION: ${{ steps.get-cli-version.outputs.TERASLICE_CLI_VERSION }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Get Commit Short SHA
        id: get-short-sha
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          calculatedSha=$(git rev-parse --short "$HEAD_SHA")
          echo "COMMIT_SHORT_SHA=$calculatedSha" >> $GITHUB_OUTPUT
      - name: Get Teraslice CLI version
        id: get-cli-version
        env:
          TERASLICE_CLI_VERSION: ${{ (startsWith(github.ref, 'refs/heads/release/elasticsearch-assets-v') || startsWith(github.base_ref, 'release/elasticsearch-assets-v')) && 'prerelease' || 'latest' }}
        run: echo "TERASLICE_CLI_VERSION=$TERASLICE_CLI_VERSION" >> $GITHUB_OUTPUT

  check-docker-limit-before:
    uses: terascope/workflows/.github/workflows/check-docker-limit.yml@ee93e5655fd79976999f2c665ac1b6d7e334ec3b
    permissions:
      contents: read
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  cache-docker-images:
    needs: check-docker-limit-before
    uses: terascope/workflows/.github/workflows/cache-docker-images.yml@ee93e5655fd79976999f2c665ac1b6d7e334ec3b
    permissions:
      contents: read
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-elasticsearch-assets:
    runs-on: ubuntu-latest
    needs: compute-vars
    permissions:
      contents: read
    strategy:
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in build-and-publish-asset.yml
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm run setup

      - name: Append dev tag to version
        env:
          COMMIT_SHORT_SHA: ${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}
        run: |
          jq --arg sha "$COMMIT_SHORT_SHA" '.version += "-dev." + $sha' asset/asset.json > tempAsset.json && mv tempAsset.json asset/asset.json
          cat asset/asset.json

      - name: Check teraslice-cli version
        env:
          TERASLICE_CLI_VERSION: ${{ needs.compute-vars.outputs.TERASLICE_CLI_VERSION }}
        run: pnpm dlx "teraslice-cli@$TERASLICE_CLI_VERSION" -v
      - name: Build asset
        env:
          TERASLICE_CLI_VERSION: ${{ needs.compute-vars.outputs.TERASLICE_CLI_VERSION }}
        run: pnpm dlx "teraslice-cli@$TERASLICE_CLI_VERSION" assets build
      - run: ls -l build/

      - name: Archive test build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: teraslice-test-asset-${{ matrix.node-version }}-dev.${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}
          path: ./build
          retention-days: 7

  test-elasticsearch-assets:
    runs-on: ubuntu-latest
    needs: [compute-vars, cache-docker-images]
    permissions:
      contents: read
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    strategy:
       # opensearch is finiky, keep testing others if it fails
      fail-fast: false
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in build-and-publish-asset.yml
        node-version: [22, 24]
        search-version: [opensearch1, opensearch2, opensearch3]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # we login to docker to avoid docker pull limit rates
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: pnpm run setup
      - run: pnpm run lint

      - name: Create Docker Image List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run docker:listImages
          cat ./images/image-list.txt

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-

      - name: Test asset for ${{ matrix.search-version }}
        run: SKIP_IMAGE_DELETION='true' pnpm run test:${{ matrix.search-version }}

      - name: Test apis for ${{ matrix.search-version }}
        run: pnpm run test:${{ matrix.search-version }}
        working-directory: ./packages/elasticsearch-asset-apis

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs.commit-${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}.${{ matrix.search-version }}
          path: |
            logs/*.log
            packages/elasticsearch-asset-apis/logs/*.log
          retention-days: 3

  test-elasticsearch-assets-encrypted:
    runs-on: ubuntu-latest
    needs: [compute-vars, cache-docker-images]
    permissions:
      contents: read
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    strategy:
       # opensearch is finiky, keep testing others if it fails
      fail-fast: false
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in build-and-publish-asset.yml
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # we login to docker to avoid docker pull limit rates
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: pnpm run setup
      - run: pnpm run lint

      - name: Create Docker Image List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run docker:listImages
          cat ./images/image-list.txt

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-

      - name: Install mkcert
        run: curl -Ss -JLO "https://dl.filippo.io/mkcert/v1.4.4?for=linux/amd64" && sudo chmod 777 mkcert-v1.4.4-linux-amd64 && sudo cp mkcert-v1.4.4-linux-amd64 /usr/local/bin/mkcert
      - name: Check mkcert
        run: command -v mkcert
      - name: Test asset with encrypted opensearch
        run: SKIP_IMAGE_DELETION='true' pnpm run test:encrypted

      - name: Test apis with encrypted opensearch
        run: pnpm run test:encrypted
        working-directory: ./packages/elasticsearch-asset-apis

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs.commit-${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}
          path: |
            logs/*.log
            packages/elasticsearch-asset-apis/logs/*.log
          retention-days: 3

  test-e2e:
    runs-on: ubuntu-latest
    needs: [compute-vars, cache-docker-images]
    permissions:
      contents: read
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    strategy:
       # opensearch is finiky, keep testing others if it fails
      fail-fast: false
      matrix:
        # NOTE: Hard Coded Node Version array, should match array in build-and-publish-asset.yml
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # we login to docker to avoid docker pull limit rates
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: pnpm run setup
      - run: pnpm run lint

      - name: Create Docker Image List
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run docker:listImages
          cat ./images/image-list.txt

      - name: Restore Docker image cache
        id: docker-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker_cache
          key: docker-images-${{ hashFiles('./images/image-list.txt') }}-master
          restore-keys: |
            docker-images-${{ hashFiles('./images/image-list.txt') }}-
            docker-images-

      - name: Install teraslice-cli
        run: npm install -g teraslice-cli
      - name: Run e2e tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm test:e2e
      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: logs.commit-${{ needs.compute-vars.outputs.COMMIT_SHORT_SHA }}.job-${{ github.job }}.node-${{ matrix.node-version }}
          path: logs/*.log
          retention-days: 3

  test-website:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # NOTE: Hard Coded Node Version
          node-version: '24'
          cache: 'pnpm'
      - name: Build Documentation
        run: pnpm run setup && ./scripts/build-documentation.sh
      - name: Check Output
        run: find ./website/build

  comment-artifact-urls:
    # skip comment on push event (merge to master) and dependabot PRs
    if: github.event_name != 'push' && github.actor != 'dependabot[bot]'
    needs: [test-elasticsearch-assets, test-elasticsearch-assets-encrypted, test-e2e]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Get Artifacts List
        id: artifacts-list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACTS_JSON=$(gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts")
          echo "$ARTIFACTS_JSON"
          ID_LIST=$(echo "$ARTIFACTS_JSON" | jq -c  '[.artifacts[] | {name: .name, id:.id}]')
          echo "$ID_LIST"
          echo "artifact-ids=$ID_LIST" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACT_IDS: ${{ steps.artifacts-list.outputs.artifact-ids }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          LIST=$(echo "$ARTIFACT_IDS" | jq -r --arg repo "$REPOSITORY" --arg run_id "$RUN_ID" '.[] | "\(.name): https://github.com/\($repo)/actions/runs/\($run_id)/artifacts/\(.id)"')
          COMMENT=$(printf "Asset artifacts:\n%s" "$LIST")
          gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$COMMENT"

  check-docker-limit-after:
    needs: [test-elasticsearch-assets, test-elasticsearch-assets-encrypted, test-e2e]
    if: always()
    uses: terascope/workflows/.github/workflows/check-docker-limit.yml@ee93e5655fd79976999f2c665ac1b6d7e334ec3b
    permissions:
      contents: read
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  all-tests-passed:
    needs: [build-elasticsearch-assets, test-elasticsearch-assets, test-elasticsearch-assets-encrypted, test-e2e, test-website]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - run: echo "All tests have passed"
      
